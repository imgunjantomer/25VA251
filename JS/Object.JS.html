<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Object in JS</title>
</head>
<body>
    <script>
        //Object in JS : collection(pair) of keys(properties) and its value.

        //create an object using literal way...

        let student={
            name:"Gunnu rajput",
            age:19,
            isMarried:false,
            address:{
                ColonyNo:2,
                area:"Pilkhuwa",
                city:"GZB",
                pincode:245304
            },
            course:"B-tech",
            branch:"CSE",
            year:"2025",
            getInfo:function(){
                return "My education detail is " +
                student.branch + " " + student.year;
            },
            subject:["Mathematics", "Physics", "CS", "English"],
            examDone:null
        };
        //access object's keys or property
        console.log(student.address.pincode);  //object
        console.log(student.getInfo());  //function
        console.log(student.subject[2]);       //array
        console.log(typeof(student));

        //find any key in your object
    
        console.log('name' in student);


        //delete any key from object
        console.log(delete student.name);
        console.log(student);

        //find length of object
        let keysLength=Object.keys(student)
        console.log(keysLength.length);

        //iterate object's key(properties)
        for(let i=0; i<keysLength.length; i++)
        console.log(student[keysLength])


        //iterate object's key(properties) using for ...in loop

        for(let x in student){
            console.log(student[x]);
        }
        

        //create an object using new keyword
        let myInfo=new Object();
        myInfo.name="Gunnu";
        myInfo.age=19;
        myInfo.city= "Delhi";
        myInfo.mob=987654321;
        myInfo.address=null;

        //access Object's keys using[]
        console.log(myInfo['name']);
    </script>
</body>
</html>
