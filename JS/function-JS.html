<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //function- block of codes, design to perform specific task
        //types of function- with parameter, without parameter and with default parameter
       
       
        //normal function without parameter

        function demo(){
            console.log("Hello JS");
        }
        demo();   //functon calling

        //function with parameter
        function demo1(text){
            console.log("Hello "+ text);
        }
        demo1("React");

        //function with default parameter
        function add(a,b=63){
            var num1=a;
            var num2=b;
            var res=num1+num2;
            console.log("Addition of two number is "+ res);
        }
         //here default value takes of b not a if we only give one value
        add(37); //argument

        //synchronous and asynchronous

        function mine(){

            function add(a,b){
                console.log("addition is "+ (a+b));
            }
               function sub(x,y){
                console.log("Subtraction is "+ (x-y));
            }
               function mul(p,q){
                console.log("Multiplication is "+ (p*q));
            }
        add(9,5);
        sub(6,4);
        mul(7,7);
        }
        mine();

        //Asynchronous function

        let msg=function(){
            console.log("Hello Gunnu");
        }
        msg();
        //short code for above function

        let msg1=()=>console.log("Hello React");
        msg1();

    
        //arrow function with multiple lines
        let msg2=(age)=>{
            if(age>=18){
                console.log("Valid age");
            }
        }
        msg2(23);

        //call back function
        function cal(a,b,callback){
            var num1=a;
            console.log("First number is "+ num1);
            var num2=b;
            console.log("Second number is "+ num2);
            var res=num1+num2;
            callback(res);
        }
        function display(res){
            console.log("Result is "+ res);
        }
        cal(3,4,display);

        //callback using setTimeout API

        function greeting(){
            document.writeln("Hello Gunjan");
        }
        function loading(){
            document.writeln("Data loading......");
        }
        loading();
        setTimeout(greeting, 2000);

        //javascript promises

        //promises stages......
        //pending- operation started (not finished)
        //rejected- operation failed
        //fulfilled- operation comepleted

        let promise=new Promise(function(resolve,reject){
            let myAge=23;
            if(myAge>=18){
                resolve("valid age");
            }
            else{
                reject("wait for next year!");
            }
        });
        promise.then(result=>console.log(result)).catch(error=>console.log(error));
        
        //fetch Api

        async function userData(){
            let userResponse=await fetch('https://dummyjson.com/products');
            let userDataRes=await userResponse.json();
            console.log(userResponse);
        }
        userData();

        //async await using try catch

        async function productDetail() {
         try{
            let proRes=await fetch('https://dummyjson.com/products');
            let proResData=await proRes.json();
            console.log(proResData);
        }
        catch(error){
            console.log("not valid data "+ error);
        }
    }
    productDetail();

    //IIFE- is a JavaScript function that runs as soon as it is defined.

    (function(){
        console.log("Hello Gunnu");
    })();
    //short code for above function
    (msg=>console.log("IIFE"))();   
    console.log(typeof(msg));

    //Local Storage- 


    let myInfo={
        name:"Gunjan",
        age:19,
        mob:678934,
        Branch:"CSE",
        course:"B-tech",
        year:"2026",
        section:"15",
    };
    //convert object into JSON string
    let myInfoData=JSON.stringify(myInfo);

    //set the data
    localStorage.setItem('prefrences',myInfoData);

    //get data
    let myPrefrence=localStorage.getItem('prefrences');
    
    //retreive the data and convert into JSON object
    let myInfoPre=JSON.parse(myPrefrence);

    //access keys
    console.log(myInfoPre.name);

    //High order function- Takes one or more functions as arguments (often called callback functions).
     //Returns a new function as its result
    //map
    let num=[1,2,3,4,5,6,7,8,9];
    let result=num.map(n=>n*2);
    console.log(result);

    //reduce- return single value
    let sum=num.reduce((total,n)=>total+n);
    console.log(sum);   //45

    //filter create a new array that passes test template
    let sorting=num.filter(n=>n>3);
    console.log(sorting);

    //forEach- 
    num.forEach((n)=>console.log(n*n));
    console.log(`updated array is ${num}`);
    </script>
</body>
</html>
