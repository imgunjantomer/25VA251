<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loops in JS</title>
</head>
<body>
    <script>
        //Loops in JavaScript are used to execute a block of code repeatedly until a specific condition is met

        //for loop...

        let studentList=["Guunu","Gunjan","Pari","Pookie","Cutie"];
        for(let i=0; i<studentList.length; i++){
            console.log(studentList[i]);

        }
        //while loop...
        let i=0;
        while(i< studentList.length){
            console.log(studentList[i]);
            i++;
        }  
        
        //for....of loop: 
        for(let x of studentList){
            console.let(x);
        }

        //for...in loop in JavaScript is used to iterate over the 
        //enumerable properties (keys) of an object

        //see example in object file
    </script>
</body>
</html>
